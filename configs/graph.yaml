# Graph Engine Configuration
# Skeletonization, cleaning, simplification, export

skeletonize:
  method: "scipy"  # "scipy" or "sknw"

sknw:
  enabled: true
  fallback: true  # use fallback if sknw not available

cleaning:
  remove_self_loops: true
  remove_small_components: true
  min_component_size: 1
  merge_close_nodes: true
  merge_distance: 5.0
  snap_endpoints: true
  snap_distance: 10.0
  remove_dangling: true
  max_dangling_length: 5.0

simplification:
  enabled: true
  tolerance: 2.0
  method: "douglas_peucker"

export:
  default_format: "graphml"  # "graphml", "geojson", "pickle"
  graphml_as_simple: true  # convert MultiDiGraph to Graph for GraphML