repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: pyright
        name: Pyright Type Check
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false
        args: [src/]

      - id: pytest
        name: Run Tests
        entry: pytest
        language: system
        types: [python]
        pass_filenames: false
        args: [tests/, -q]
        always_run: false
        stages: [commit, push]
